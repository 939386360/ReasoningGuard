models:
  agent_backbones:
    - name: gpt-4o
      provider: openai
      max_tokens: 4096
    - name: claude-3.5-sonnet
      provider: anthropic
      max_tokens: 4096
    - name: gemini-1.5-pro
      provider: google
      max_tokens: 4096
    - name: llama-3.1-70b
      provider: vllm
      max_tokens: 4096
  judge:
    name: Qwen/Qwen2.5-7B-Instruct
    max_tokens: 512
    temperature: 0.0

ptg:
  session_key_bits: 256
  hmac_algorithm: SHA256
  intent_entailment_threshold: 0.75
  cross_server_consent_required: true
  origin_tag_format: "server:{server_id}"

rtv:
  anomaly_classes:
    - CAI
    - OAV
    - IAD
  thresholds:
    CAI: 0.65
    OAV: 0.60
    IAD: 0.70
  trace_structure:
    - observation
    - inference
    - decision
  memory_provenance:
    enabled: true
    max_graph_size: 10000
    session_retention: 100

benchmarks:
  mcptox:
    num_scenarios: 200
    attack_categories:
      - tool_description_poisoning
      - parameter_injection
      - response_manipulation
      - capability_escalation
  agentpi:
    num_context_dependent: 150
  mcptox_plus:
    num_context_dependent: 80
    num_cross_session_t3: 50
    t3_max_session_gap: 10

evaluation:
  metrics:
    - asr
    - tcr
    - latency_ms
    - fpr
    - fnr
  num_runs: 3
  confidence_level: 0.95
  mock_mode: true